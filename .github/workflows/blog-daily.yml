name: Blog Post (2x daily)

on:
  schedule:
    # 13:00 UTC = 9 AM EDT / 8 AM EST — morning article.
    - cron: "0 13 * * *"
    # 21:00 UTC = 5 PM EDT / 4 PM EST — afternoon article.
    - cron: "0 21 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (draft + preview only, don't write into site/)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

permissions:
  contents: write   # commit the new article + sitemap back to this repo

jobs:
  blog:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install blog deps
        working-directory: blog
        run: npm install --no-audit --no-fund

      - name: Check secrets
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          missing=0
          for v in ANTHROPIC_API_KEY OPENAI_API_KEY; do
            val="${!v}"
            if [ -z "$val" ]; then
              echo "::error::Required secret $v is empty or not set"
              missing=1
            else
              echo "OK: $v is set (len=${#val})"
            fi
          done
          [ "$missing" = "0" ] || exit 1

      - name: Run blog agent
        working-directory: blog
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SITE_URL: ${{ secrets.SITE_URL || 'https://www.homeadvisorlocksmith.com' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            npm run post:dry
          else
            npm run post
          fi

      - name: Commit new article + sitemap
        # Commit the generated site/ files AND the blog queue state so the
        # next run skips this topic. Vercel (connected to this repo) deploys
        # on push.
        if: ${{ always() && github.event.inputs.dry_run != 'true' }}
        run: |
          if [ -n "$(git status --porcelain site blog/state.json)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add site blog/state.json
            git commit -m "Blog: new article [skip ci]"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          else
            echo "No new article to commit."
          fi

      - name: Upload preview artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blog-preview-${{ github.run_id }}
          path: blog/preview/
          retention-days: 14
          if-no-files-found: ignore
